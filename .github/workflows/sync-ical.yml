# Polls every connected channel iCal feed every 15 minutes by
# pinging /api/cron/sync-ical on the production deployment. Lives
# in GitHub Actions instead of vercel.json because Vercel's Hobby
# plan rejects sub-daily cron schedules; Actions is free and gives
# us minute-level scheduling without bumping to Vercel Pro.
#
# Default state: dormant. We don't have enough connected iCal
# feeds yet to justify the every-15-minute traffic; for the moment
# operators trigger manual syncs from the property page when they
# need fresh availability. The file stays in the repo so flipping
# this back on is a one-toggle change rather than a code change.
#
# To re-enable the scheduled poll:
#   GitHub → Settings → Secrets and variables → Actions → Variables
#   → New repository variable → name: ICAL_SYNC_ENABLED, value: true
#
# To run a one-off sync without flipping the variable:
#   GitHub → Actions → Sync iCal feeds → Run workflow
#
# The endpoint requires Authorization: Bearer $CRON_SECRET. Set
# CRON_SECRET both as a Vercel project env var (so the route can
# verify) and as a GitHub repo secret (so this workflow can send).
#
# A workflow that's gated by `if:` and skipped reports as "Skipped"
# (neutral grey) on the commit, doesn't show as failure, and
# doesn't block branch protection rules that don't list it.

name: Sync iCal feeds

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Single source of truth for "is the scheduled iCal poll on?".
    # Manual workflow_dispatch always runs so an operator can force a
    # sync from the Actions UI without flipping the repo variable.
    if: ${{ vars.ICAL_SYNC_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Ping sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://goldstay.co.ke/api/cron/sync-ical)
          echo "HTTP $response"
          cat /tmp/body
          echo
          if [ "$response" != "200" ]; then
            exit 1
          fi
