# GitHub Actions CI for Goldstay.
#
# Default state: dormant. Vercel runs the same `next build` on every
# push, so this workflow is duplicate work and the deploy fails fast
# enough on its own. We keep the file in the repo (rather than
# deleting it) so re-enabling is a one-toggle change in the GitHub
# UI rather than a code change + review cycle.
#
# To re-enable on every push and PR:
#   GitHub → Settings → Secrets and variables → Actions → Variables
#   → New repository variable → name: CI_ENABLED, value: true
#
# To re-enable for a single ad-hoc run without flipping the variable:
#   GitHub → Actions → CI → Run workflow
#
# A workflow that's gated by `if:` and skipped reports as "Skipped"
# (neutral grey) on the commit / PR — it doesn't show as failure
# and doesn't block branch protection rules that don't list it.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Build
    runs-on: ubuntu-latest
    # Single source of truth for "is CI on?". Manual workflow_dispatch
    # always runs so the team can sanity-check the build on demand
    # without having to flip the repo variable first.
    if: ${{ vars.CI_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      # We use pnpm for all local installs (see pnpm-lock.yaml), so CI
      # has to match or the two lockfiles drift the moment anyone runs
      # `pnpm add` without also running `npm install`. Version is read
      # from the `packageManager` field in package.json so corepack,
      # Vercel and this action all agree on a single pinned pnpm.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
