name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # We use pnpm for all local installs (see pnpm-lock.yaml), so CI
      # has to match or the two lockfiles drift the moment anyone runs
      # `pnpm add` without also running `npm install`. Version is read
      # from the `packageManager` field in package.json so corepack,
      # Vercel and this action all agree on a single pinned pnpm.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
